<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contenido no disponible</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background-color: #1e293b;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      max-width: 500px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
      color: #38bdf8;
    }

    p {
      margin-bottom: 25px;
      color: #cbd5f5;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      background-color: #f59e0b;
      color: #0f172a;
      border-radius: 8px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    a {
      text-decoration: none;
      background-color: #38bdf8;
      color: #0f172a;
      padding: 10px 20px;
      border-radius: 10px;
      transition: 0.3s;
      display: inline-block;
    }

    a:hover {
      background-color: #0ea5e9;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="badge">🚧 En desarrollo</div>

    <h1>Asignatura no disponible</h1>

    <p>
      Este contenido todavía no está preparado.<br>
      Estamos trabajando en ello 💻
    </p>

    <a href="../index.html">⬅ Volver al menú</a>
  </div>

</body>
</html>
